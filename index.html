            theme: {
                extend: {

                        success: { 500:'#22c55e',600:'#16a34a' },

                }

  <style>
        * { -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .slide-in { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from{transform:translateX(-100%)} to{transform:translateX(0)} }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: scale(0.96); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .toast { animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
        @keyframes toastIn { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes toastOut { from{opacity:1} to{opacity:0} }
        .dark .dark-bg { background: #1e293b; }
        .dark .dark-card { background: #334155; color: #f1f5f9; }
        .dark .dark-text { color: #f1f5f9; }
        .dark .dark-input { background: #475569; border-color: #64748b; color: #f1f5f9; }
    </style>

 </head>

// Demo accounts

const SAMPLE_QUESTIONS = [

    { examId:'exam1', id:'q5', text:'Jika f(x) = x³ - 3x² + 2, tentukan nilai x saat f\'(x) = 0', type:'pg', options:JSON.stringify(['x=0, x=2','x=1, x=3','x=0, x=3','x=1, x=2']), correct:'A', difficulty:'sulit' },
];

// Sample results for analytics
const SAMPLE_RESULTS = [
    { examId:'exam3', studentId:'siswa1', studentName:'Ahmad Rizki', score:85, answers:JSON.stringify({q1:'A',q2:'B',q3:'A'}) },
    { examId:'exam3', studentId:'siswa2', studentName:'Putri Amelia', score:72, answers:JSON.stringify({q1:'A',q2:'A',q3:'C'}) },
    { examId:'exam3', studentId:'siswa3', studentName:'Dimas Pratama', score:90, answers:JSON.stringify({q1:'A',q2:'B',q3:'A'}) },
];

// ===== UTILITY =====
function showToast(msg, type='success') {
    APP.toast = { msg, type };
    render();
    setTimeout(() => { APP.toast = null; render(); }, 3000);
}

function toggleDark() {
    APP.darkMode = !APP.darkMode;
    document.documentElement.classList.toggle('dark', APP.darkMode);
    render();
}

// ===== RENDER ENGINE =====
function render() {
    const app = document.getElementById('app');
    let html = '';
    
    if (APP.toast) {
        const tc = APP.toast.type === 'success' ? 'bg-success-500' : APP.toast.type === 'error' ? 'bg-danger-500' : 'bg-primary-500';
        html += `<div class="toast fixed bottom-4 left-1/2 -translate-x-1/2 ${tc} text-white px-6 py-3 rounded-xl shadow-lg z-[9999] text-sm font-medium">${APP.toast.msg}</div>`;
    }

    switch(APP.currentView) {
        case 'login': html += renderLogin(); break;
        case 'admin': html += renderAdmin(); break;
        case 'guru': html += renderGuru(); break;
        case 'siswa': html += renderSiswa(); break;
        case 'exam': html += renderExam(); break;
        default: html += renderLogin();
    }
    app.innerHTML = html;
    lucide.createIcons();
    bindEvents();
}

// ===== LOGIN PAGE =====
function renderLogin() {
    return `
    <div class="h-full w-full flex items-center justify-center p-4 bg-gradient-to-br from-primary-50 via-white to-blue-50 dark:from-slate-900 dark:via-slate-800 dark:to-slate-900">
        <div class="w-full max-w-sm fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-200">
                    <i data-lucide="graduation-cap" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 dark-text">${APP.config.app_title}</h1>
                <p class="text-sm text-gray-500 mt-1">${APP.config.school_name}</p>
            </div>
            <div class="bg-white dark-card rounded-3xl p-6 shadow-xl shadow-gray-200/50">
                <div id="login-error" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-xl mb-4"></div>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Email / NIP / NIS</label>
                        <input id="login-email" type="text" placeholder="Masukkan email" class="w-full mt-1.5 px-4 py-3 rounded-xl border border-gray-200 dark-input focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none transition text-sm">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Password</label>
                        <input id="login-pass" type="password" placeholder="Masukkan password" class="w-full mt-1.5 px-4 py-3 rounded-xl border border-gray-200 dark-input focus:border-primary-500 focus:ring-2 focus:ring-primary-100 outline-none transition text-sm">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center gap-2 text-sm text-gray-600">
                            <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-primary-500">
                            <span>Ingat saya</span>
                        </label>
                        <button class="text-sm text-primary-500 font-medium" onclick="showToast('Fitur reset password akan dikirim via email','info')">Lupa password?</button>
                    </div>
                    <button id="btn-login" class="w-full py-3.5 bg-primary-500 hover:bg-primary-600 text-white rounded-xl font-semibold text-sm btn-press shadow-lg shadow-primary-200 transition">
                        Masuk
                    </button>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-100">
                    <p class="text-xs text-gray-400 text-center mb-3">Demo Akun:</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="fillDemo('admin')" class="text-xs py-2 px-2 bg-purple-50 text-purple-600 rounded-lg font-medium btn-press hover:bg-purple-100 transition">Admin</button>
                        <button onclick="fillDemo('guru')" class="text-xs py-2 px-2 bg-green-50 text-green-600 rounded-lg font-medium btn-press hover:bg-green-100 transition">Guru</button>
                        <button onclick="fillDemo('siswa')" class="text-xs py-2 px-2 bg-blue-50 text-blue-600 rounded-lg font-medium btn-press hover:bg-blue-100 transition">Siswa</button>
                    </div>
                </div>
            </div>
            <div class="flex justify-center mt-4">
                <button onclick="toggleDark()" class="text-xs text-gray-400 flex items-center gap-1.5 hover:text-gray-600 transition">
                    <i data-lucide="${APP.darkMode?'sun':'moon'}" class="w-3.5 h-3.5"></i>
                    ${APP.darkMode?'Light Mode':'Dark Mode'}
                </button>
            </div>
        </div>
    </div>`;
}

function fillDemo(role) {
    const acc = DEMO_ACCOUNTS.find(a=>a.role===role);
    if(acc) {
        document.getElementById('login-email').value = acc.email;
        document.getElementById('login-pass').value = acc.password;
    }
}

function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const acc = DEMO_ACCOUNTS.find(a => a.email === email && a.password === pass);
    if(acc) {
        APP.currentUser = acc;
        APP.currentView = acc.role;
        APP.sidebarOpen = false;
        showToast(`Selamat datang, ${acc.name}!`);
    } else {
        const err = document.getElementById('login-error');
        if(err) { err.classList.remove('hidden'); err.textContent = 'Email atau password salah!'; }
    }
}

function logout() {
    APP.currentUser = null;
    APP.currentView = 'login';
    APP.sidebarOpen = false;
    render();
}
